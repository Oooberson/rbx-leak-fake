<!DOCTYPE html>
<html lang="en">
<head>
    <title>RBX-LEAK (FAKE)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <h1>RBX-LEAK <span style="font-size: 12px; color: red;">(FAKE - FOR FUN)</span></h1>
        <div class="auth-box">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth('login')">Login</button>
            <button onclick="handleAuth('signup')">Sign Up</button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <nav>
            <span>Welcome, <b id="display-name"></b></span>
            <span>Balance: <span id="balance">10,000</span> R$</span>
            <button id="admin-btn" style="display:none;" onclick="toggleAdmin()">ADMIN PANEL</button>
            <button onclick="logout()">Logout</button>
        </nav>

        <div class="game-container">
            <h2>Mines (Fake)</h2>
            <div id="mines-grid" class="grid"></div>
            <div class="controls">
                <input type="number" id="bet-amount" value="100">
                <button onclick="startMines()">Start Game</button>
                <button id="cashout-btn" disabled onclick="cashOutMines()">Cash Out</button>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="admin-panel" class="modal">
            <h3>Admin Dashboard</h3>
            <button onclick="addFakeRobux(100000)">Give +100k R$</button>
            <button onclick="toggleGodMode()">God Mode: <span id="god-status">OFF</span></button>
            <p>Admin powers allow you to see mines and never lose.</p>
            <button onclick="toggleAdmin()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
