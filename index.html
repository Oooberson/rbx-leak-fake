<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RORUSH | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- AUTH SCREEN -->
    <div id="auth-screen">
        <div class="auth-box glass">
            <h1 class="logo-text">RORUSH <span class="badge">ROBLOX</span></h1>
            <p style="color:#666; font-size:12px;">FAKE CURRENCY - FOR FUN</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth('login')" class="btn-primary">LOGIN</button>
            <button onclick="handleAuth('signup')" class="btn-ghost">SIGN UP</button>
        </div>
    </div>

    <!-- MAIN GAME SCREEN -->
    <div id="game-screen" style="display:none;">
        <header class="glass">
            <div class="brand">RORUSH <span class="badge">ROBLOX</span></div>
            <div class="nav-links">
                <button class="nav-btn active" onclick="switchTab('crash')">Crash</button>
                <button class="nav-btn" onclick="switchTab('mines')">Mines</button>
                <button class="nav-btn" id="admin-nav-btn" style="display:none;" onclick="switchTab('admin')">⚙️ Admin</button>
            </div>
            <div class="user-pill">
                <span id="display-name">User</span> • <span class="bal-text"><span id="balance">0</span> R$</span>
                <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
            </div>
        </header>

        <main class="dashboard">
            <!-- CRASH VIEW -->
            <section id="crash-view" class="game-view">
                <div class="game-card glass">
                    <h1 id="multiplier-display">1.00x</h1>
                    <div class="controls">
                        <input type="number" id="crash-bet" value="100">
                        <button id="crash-action-btn" onclick="handleCrashLogic()">BET</button>
                    </div>
                </div>
            </section>

            <!-- MINES VIEW -->
            <section id="mines-view" class="game-view" style="display:none;">
                <div class="game-card glass">
                    <div id="mines-grid" class="mines-grid"></div>
                    <div class="controls">
                        <input type="number" id="mines-bet" value="100">
                        <button onclick="startMines()">START MINES</button>
                    </div>
                </div>
            </section>

            <!-- ADMIN VIEW -->
            <section id="admin-view" class="game-view" style="display:none;">
                <div class="admin-header">
                    <div class="admin-icon">⚙️</div>
                    <div>
                        <h2>Admin Panel</h2>
                        <p>Manage users and funds</p>
                    </div>
                </div>
                <div class="user-lookup glass">
                    <h3>🔍 User Lookup</h3>
                    <div class="search-row">
                        <input type="text" id="target-username" placeholder="Enter username...">
                        <button class="btn-orange" onclick="adminLookupUser()">LOOK UP</button>
                    </div>
                </div>
                <div id="lookup-results" class="glass" style="display:none; margin-top:20px; padding:20px;">
                    <h2 id="res-name">User</h2>
                    <div class="stats-grid">
                        <div class="stat-box"><span>BALANCE</span><p id="res-bal">0</p></div>
                    </div>
                    <div class="admin-actions" style="margin-top:20px; display:flex; gap:10px;">
                        <button class="btn-green" onclick="modifyUserFunds(1000)">+ GIVE 1,000</button>
                        <button class="btn-red" onclick="modifyUserFunds(-1000)">- REMOVE 1,000</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
